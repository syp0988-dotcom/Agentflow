id: flask-basic
name: Flask Basic Web App
description: 基于 Flask 的基础 Web 应用骨架，SQLAlchemy + Blueprint 路由 + Jinja2 模板
version: 1.0.0

match:
  keywords:
    boost:
      - flask
      - web
      - 网站
      - 后台
      - 管理
      - 页面
      - 博客
  frameworks: [flask]
  goal_types: [project]
  exclude_keywords: [fastapi, django, cli, 命令行, react, vue, frontend]

variables:
  - name: project_name
    description: 项目名称（蛇形命名）
    required: true
  - name: app_name
    description: 应用模块名称
    default: "{{ project_name }}"

dependencies:
  pip:
    - flask>=3.0.0
    - flask-sqlalchemy>=3.1.0
    - flask-migrate>=4.0.0
    - flask-wtf>=1.2.0
    - python-dotenv>=1.0.0

files:
  # ── Project root ────────────────────────────────────────────────
  - path: "{{ project_name }}/requirements.txt"
    description: Python 依赖清单
    content: |
      flask>=3.0.0
      flask-sqlalchemy>=3.1.0
      flask-migrate>=4.0.0
      flask-wtf>=1.2.0
      python-dotenv>=1.0.0

  - path: "{{ project_name }}/.env"
    description: 环境变量
    content: |
      FLASK_APP=run.py
      FLASK_ENV=development
      SECRET_KEY=change-me-to-a-random-key
      DATABASE_URL=sqlite:///app.db

  - path: "{{ project_name }}/.gitignore"
    description: Git 忽略规则
    content: |
      __pycache__/
      *.py[cod]
      *.egg-info/
      .env
      *.db
      instance/
      dist/
      build/

  - path: "{{ project_name }}/README.md"
    description: 项目说明
    content: |
      # {{ app_name }}

      {{ description }}

      ## Quick Start

      ```bash
      pip install -r requirements.txt
      flask run
      ```

  # ── Application package ─────────────────────────────────────────
  - path: "{{ project_name }}/app/__init__.py"
    description: Flask 应用工厂
    content: |
      from flask import Flask
      from flask_migrate import Migrate

      from app.config import Config
      from app.extensions import db


      def create_app(config_class: type[Config] = Config) -> Flask:
          app = Flask(__name__)
          app.config.from_object(config_class)

          db.init_app(app)
          Migrate(app, db)

          from app.main import bp as main_bp
          app.register_blueprint(main_bp)

          return app

  - path: "{{ project_name }}/app/config.py"
    description: 应用配置
    content: |
      import os
      from dotenv import load_dotenv

      load_dotenv()


      class Config:
          SECRET_KEY = os.getenv("SECRET_KEY", "change-me")
          SQLALCHEMY_DATABASE_URI = os.getenv("DATABASE_URL", "sqlite:///app.db")
          SQLALCHEMY_TRACK_MODIFICATIONS = False

  - path: "{{ project_name }}/app/extensions.py"
    description: Flask 扩展初始化
    content: |
      from flask_sqlalchemy import SQLAlchemy
      from flask_wtf.csrf import CSRFProtect

      db = SQLAlchemy()
      csrf = CSRFProtect()

  - path: "{{ project_name }}/app/models.py"
    description: 数据库模型
    content: |
      from app.extensions import db


      class User(db.Model):
          __tablename__ = "users"

          id = db.Column(db.Integer, primary_key=True)
          username = db.Column(db.String(80), unique=True, nullable=False)
          email = db.Column(db.String(120), unique=True, nullable=False)
          created_at = db.Column(db.DateTime, server_default=db.func.now())

          def __repr__(self) -> str:
              return f"<User {self.username}>"

  # ── Routes ──────────────────────────────────────────────────────
  - path: "{{ project_name }}/app/main.py"
    description: 主页路由
    content: |
      from flask import Blueprint, render_template

      bp = Blueprint("main", __name__)


      @bp.route("/")
      def index():
          return render_template("index.html")


      @bp.route("/health")
      def health():
          return {"status": "ok"}

  # ── Templates & Static ─────────────────────────────────────────
  - path: "{{ project_name }}/app/templates/base.html"
    description: 基础模板
    content: |
      <!doctype html>
      <html lang="zh-CN">
      <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>{% block title %}{{ app_name }}{% endblock %}</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
      </head>
      <body>
        <main>{% block content %}{% endblock %}</main>
      </body>
      </html>

  - path: "{{ project_name }}/app/templates/index.html"
    description: 首页模板
    content: |
      {% extends "base.html" %}
      {% block title %}Home - {{ app_name }}{% endblock %}
      {% block content %}
      <div class="container">
        <h1>{{ app_name }}</h1>
        <p>Welcome to {{ app_name }}.</p>
      </div>
      {% endblock %}

  - path: "{{ project_name }}/app/static/css/style.css"
    description: 样式文件
    content: |
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        line-height: 1.6;
        color: #333;
      }
      .container {
        max-width: 960px;
        margin: 0 auto;
        padding: 2rem 1rem;
      }

  # ── Entry point ────────────────────────────────────────────────
  - path: "{{ project_name }}/run.py"
    description: 应用启动入口
    content: |
      from app import create_app

      app = create_app()

      if __name__ == "__main__":
          app.run()
